# CopilotPi Configuration Template
# Copy to config.toml and modify as needed

# ==================== Application Settings ====================
[app]
# Admin password (change this in production!)
app_key = "QUICKstart012345+"
# Server host
host = "0.0.0.0"
# Server port
port = 8080
# Log format: true for JSON, false for text
log_json = false
# Log level: debug, info, warn, error
log_level = "info"
# Log file path
log_file_path = "logs/copilotpi.log"
# Log file max size (MB)
log_max_size_mb = 50
# Log file max backup count
log_max_backups = 3
# Database driver: sqlite or postgres
db_driver = "sqlite"
# SQLite database path
db_path = "data/copilotpi.db"
# PostgreSQL DSN (when db_driver = "postgres")
db_dsn = ""
# Default request timeout in seconds (LLM chat routes default to 300s)
request_timeout = 300
# Max time to read request headers (seconds), prevents slowloris attacks
read_header_timeout = 10
# Max size of request headers in bytes (default 1MB)
max_header_bytes = 1048576
# Default max request body size in bytes (default 1MB)
body_limit = 1048576
# Max body size for POST /v1/chat/completions in bytes (default 10MB)
chat_body_limit = 10485760
# Max failed admin auth attempts before temporary IP lockout
admin_max_fails = 10
# Time window for counting admin auth failures (seconds)
admin_window_sec = 300

# ==================== Microsoft Copilot WebSocket ====================
[copilot]
# Copilot WebSocket endpoint
ws_url = "wss://copilot.microsoft.com/chat/api"
# WebSocket API version
ws_api_version = "2"
# Ping interval to keep connection alive (seconds)
ping_interval = 25
# Maximum reconnect attempts on disconnect (0 = no retry)
reconnect_max = 3
# User-Agent string for WebSocket upgrade
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.0.0 Safari/537.36 Edg/147.0.0.0"

# ==================== Retry Policy ====================
[retry]
# Maximum number of tokens to try
max_tokens = 5
# Maximum retries per token before switching
per_token_retries = 2
# Backoff base delay (seconds)
retry_backoff_base = 0.5
# Backoff multiplier
retry_backoff_factor = 2.0
# Maximum single retry delay (seconds)
retry_backoff_max = 20.0
# Total retry budget time (seconds)
retry_budget = 60.0

# ==================== Token Pool Management ====================
[token]
# Token consecutive failure threshold (marks expired)
fail_threshold = 5
# Usage write minimum interval (seconds)
usage_flush_interval_sec = 30
# Cooling check interval (seconds)
cool_check_interval_sec = 30
# Models assigned to Free pool (basic tier - lower quota)
basic_models = [
    "copilot-free",
    "copilot-basic",
]
# Models assigned to Premium pool (M365 Premium tier - higher quota)
super_models = [
    "copilot-free",
    "copilot-basic",
    "copilot-premium",
]
# Preferred pool when model exists in both pools
preferred_pool = "premium"
# Free pool cooling duration (minutes)
basic_cool_duration_min = 60
# Premium pool cooling duration (minutes)
super_cool_duration_min = 30
# Default chat quota per token
default_chat_quota = 200
# Default image quota per token (not used, Copilot Designer out of scope)
default_image_quota = 0
# Default video quota per token (not used)
default_video_quota = 0
# Quota recovery mode: "auto" (restore defaults on cooldown expiry)
quota_recovery_mode = "auto"
# Token selection algorithm: high_quota_first / random / round_robin
selection_algorithm = "high_quota_first"
# Super quota threshold for classifying a token as premium on import
super_quota_threshold = 100
